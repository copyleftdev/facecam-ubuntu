name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: Why is this useful? What problem does it solve?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - facecam-probe
        - facecam-daemon
        - facecam-ctl
        - facecam-harness
        - facecam-visual
        - System integration (udev/systemd)
        - Documentation
        - Other
