# v4l2loopback module parameters for Facecam normalization
# Install to: /etc/modprobe.d/v4l2loopback.conf
#
# video_nr=10         : Use /dev/video10 for the virtual camera
# card_label=...      : Human-readable name shown in application device lists
# exclusive_caps=1    : MANDATORY for Chromium/Chrome/Electron app compatibility
#                       Makes device report only CAPTURE cap to consumers
# max_buffers=4       : Ring buffer depth
# max_openers=10      : Allow multiple simultaneous consumers

options v4l2loopback \
    video_nr=10 \
    card_label="Facecam Normalized" \
    exclusive_caps=1 \
    max_buffers=4 \
    max_openers=10
